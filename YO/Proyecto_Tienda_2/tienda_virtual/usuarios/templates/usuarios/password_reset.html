{% extends 'core/base.html' %}

{% block content %}

<div class="card shadow p-4 mx-auto" style="max-width: 400px">

    <h3 class="text-center mb-3">Recuperar contraseña</h3>

    <p class="text-muted text-center">
        Ingresa tu correo electrónico registrado y te enviaremos un enlace
        para restablecer tu contraseña.
    </p>

    <form method="post" action="{% url 'password_reset' %}">
        {% csrf_token %}

        <div class="mb-3 mx-auto" style="max-width: 350px">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-control form-control-lg" placeholder="Ingresa tu correo electrónico" required>
            
        </div>

        <div class="text-center mt-3">
            <button type="submit" class="btn btn-primary"> Enviar enlace de recuperación
            </button>
        </div>
    </form>
    

    <div class="text-center mt-3">
        <a href="{% url 'login' %}">
            Volver al inicio de sesión
        </a>
    </div>

</div>

{% endblock %}
