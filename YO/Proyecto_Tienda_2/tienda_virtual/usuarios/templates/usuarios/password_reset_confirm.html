{% extends 'core/base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <div class="card shadow p-4">

        <h3 class="text-center mb-3">Nueva contraseña</h3>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="d-grid">
                <button type="submit" class="btn btn-success">
                    Cambiar contraseña
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
