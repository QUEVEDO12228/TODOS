{% extends 'core/base.html' %}

{% block content %}

<h2>Iniciar sesión</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Ingresar</button>
</form>

<p class="mt-3 text-center">
    <a href="{% url 'password_reset' %}">
        ¿Olvidaste tu contraseña?
    </a>
</p>

{% endblock %}
