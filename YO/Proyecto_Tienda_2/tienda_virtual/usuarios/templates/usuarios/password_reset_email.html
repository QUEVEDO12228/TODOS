<!-- cuerpo del mensaje que llega al correo del usuario para reestablecer la contraseña -->
<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
</head>

<body style="font-family: Arial; background:#f4f4f4; padding:20px;">

	<div style="max-width:600px; margin:auto; background:white; padding:30px; border-radius:8px;">

		<h2>Recuperación de contraseña</h2>
		
		<p>Hola,</p>
		<p>Recibimos una solicitud para restablecer tu contraseña.</p>

		<p style="text-align:center; margin:30px 0;">
			<!-- protocol, se utiliza para el manejo de http o https -->
			<!-- dominio, cuando no esta en producción es 127.0.0.1:8000 -->
			<!-- uidb64=ui es la codificacion del usuario en base64 -->
			<!-- token es el token de seguridad -->
			<a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
			style="background:#0d6efd; color:white; padding:12px 20px; text-decoration:none; border-radius:5px;"> Restablecer contraseña
			</a>
		</p>

		<p>Si no solicitaste este cambio puedes ignorar este mensaje.</p>

	</div>

</body>
</html>
